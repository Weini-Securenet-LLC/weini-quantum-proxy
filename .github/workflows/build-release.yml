name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 当推送 v 开头的 tag 时触发（如 v1.0.0）
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 需要写权限来创建 release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - name: Windows AMD64
            os: windows-latest
            goos: windows
            goarch: amd64
            wails_platform: windows/amd64
            artifact_name: weini-quantum-proxy-windows-amd64.exe
            
          # macOS
          - name: macOS Universal
            os: macos-latest
            goos: darwin
            goarch: universal
            wails_platform: darwin/universal
            artifact_name: weini-quantum-proxy-macos-universal.app
            
          # Linux
          - name: Linux AMD64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            wails_platform: linux/amd64
            artifact_name: weini-quantum-proxy-linux-amd64
    
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以便获取版本信息
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # Linux 特定依赖
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            build-essential \
            pkg-config
      
      # Windows 特定设置
      - name: Setup Windows environment
        if: matrix.os == 'windows-latest'
        run: |
          echo "CGO_ENABLED=1" >> $GITHUB_ENV
      
      # macOS 特定设置
      - name: Setup macOS environment
        if: matrix.os == 'macos-latest'
        run: |
          echo "CGO_ENABLED=1" >> $GITHUB_ENV
      
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      
      - name: Download Go modules
        run: go mod download
      
      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(git describe --tags --always --dirty)
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
      
      - name: Build application
        working-directory: cmd/proxy-node-studio-wails
        shell: bash
        run: |
          wails build \
            -clean \
            -platform ${{ matrix.wails_platform }} \
            -ldflags "-s -w -X main.Version=${{ steps.version.outputs.VERSION }} -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S')"
      
      # 查找编译产物
      - name: Find build artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          BUILD_DIR="cmd/proxy-node-studio-wails/build/bin"
          if [ -f "$BUILD_DIR/proxy-node-studio-wails.exe" ]; then
            mv "$BUILD_DIR/proxy-node-studio-wails.exe" "$BUILD_DIR/${{ matrix.artifact_name }}"
          elif [ -f "$BUILD_DIR/weini-quantum-proxy.exe" ]; then
            mv "$BUILD_DIR/weini-quantum-proxy.exe" "$BUILD_DIR/${{ matrix.artifact_name }}"
          fi
          echo "BUILD_ARTIFACT=$BUILD_DIR/${{ matrix.artifact_name }}" >> $GITHUB_ENV
      
      - name: Find build artifacts (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          BUILD_DIR="cmd/proxy-node-studio-wails/build/bin"
          if [ -d "$BUILD_DIR/proxy-node-studio-wails.app" ]; then
            mv "$BUILD_DIR/proxy-node-studio-wails.app" "$BUILD_DIR/weini-quantum-proxy.app"
          fi
          # 创建 .app 的 zip 压缩包
          cd "$BUILD_DIR"
          zip -r weini-quantum-proxy-macos-universal.zip weini-quantum-proxy.app
          cd -
          echo "BUILD_ARTIFACT=$BUILD_DIR/weini-quantum-proxy-macos-universal.zip" >> $GITHUB_ENV
      
      - name: Find build artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          BUILD_DIR="cmd/proxy-node-studio-wails/build/bin"
          if [ -f "$BUILD_DIR/proxy-node-studio-wails" ]; then
            mv "$BUILD_DIR/proxy-node-studio-wails" "$BUILD_DIR/${{ matrix.artifact_name }}"
          elif [ -f "$BUILD_DIR/weini-quantum-proxy" ]; then
            mv "$BUILD_DIR/weini-quantum-proxy" "$BUILD_DIR/${{ matrix.artifact_name }}"
          fi
          chmod +x "$BUILD_DIR/${{ matrix.artifact_name }}"
          echo "BUILD_ARTIFACT=$BUILD_DIR/${{ matrix.artifact_name }}" >> $GITHUB_ENV
      
      # 上传构建产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.BUILD_ARTIFACT }}
          if-no-files-found: error
  
  # 创建 Release
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Display structure of downloaded files
        run: ls -R artifacts
      
      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"
      
      - name: Create Release Notes
        id: release_notes
        run: |
          cat > release_notes.md << 'EOF'
          ## Weini Quantum Proxy ${{ steps.version.outputs.VERSION }}
          
          ### Downloads
          
          Choose the version for your operating system:
          
          - **Windows**: `weini-quantum-proxy-windows-amd64.exe`
          - **macOS**: `weini-quantum-proxy-macos-universal.zip` (Universal Binary for Intel & Apple Silicon)
          - **Linux**: `weini-quantum-proxy-linux-amd64`
          
          ### Installation
          
          #### Windows
          1. Download `weini-quantum-proxy-windows-amd64.exe`
          2. Double-click to run
          3. Windows Defender may show a warning - click "More info" → "Run anyway"
          
          #### macOS
          1. Download `weini-quantum-proxy-macos-universal.zip`
          2. Extract the .zip file
          3. Move `weini-quantum-proxy.app` to Applications
          4. Right-click and select "Open" the first time (bypasses Gatekeeper)
          
          #### Linux (Ubuntu/Debian)
          ```bash
          # Download
          wget https://github.com/Weini-Securenet-LLC/weini-quantum-proxy/releases/download/${{ steps.version.outputs.VERSION }}/weini-quantum-proxy-linux-amd64
          
          # Make executable
          chmod +x weini-quantum-proxy-linux-amd64
          
          # Run
          ./weini-quantum-proxy-linux-amd64
          ```
          
          ### What's Changed
          
          See [CHANGELOG.md](https://github.com/Weini-Securenet-LLC/weini-quantum-proxy/blob/main/CHANGELOG.md) for detailed changes.
          
          ### Support
          
          - 📖 Documentation: [Quick Start Guide](https://github.com/Weini-Securenet-LLC/weini-quantum-proxy/blob/main/docs/QUICK_START.md)
          - 💬 Issues: [GitHub Issues](https://github.com/Weini-Securenet-LLC/weini-quantum-proxy/issues)
          - 📧 Email: info@weinisecure.net
          
          ---
          
          **Full Changelog**: https://github.com/Weini-Securenet-LLC/weini-quantum-proxy/compare/v0.9.0...${{ steps.version.outputs.VERSION }}
          EOF
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
